<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#412991;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06d6a0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="10" y="10" width="180" height="180" rx="36" fill="url(#bg)" />
  <!-- Terminal bracket > -->
  <text x="42" y="138" font-family="SF Mono,Menlo,monospace" font-size="120" font-weight="700" fill="url(#accent)">&gt;</text>
  <!-- Cursor block -->
  <rect x="130" y="72" width="28" height="60" rx="4" fill="#10b981" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.3;0.85" dur="1.2s" repeatCount="indefinite" />
  </rect>
</svg>
